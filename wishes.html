
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>A Special Wish</title>

<link rel="stylesheet" href="style.css">
</head>

<body class="wish-page">

<div class="wish-bg">

    <div class="sparkles"></div>

    <div class="wish-container">

        <h1 class="wish-title">
            🌹 A Special Wish 🌹
        </h1>

        <div class="character-scene">

            <img
            src="assets/boy.png"
            alt="Boy"
            class="boy-character">

            <div class="rose-container">

                <div class="rose-glow"></div>

                <div class="rose">
                    🌹
                </div>

            </div>

            <img
            src="assets/girl.png"
            alt="Girl"
            class="girl-character">

        </div>

        <div class="heart-burst">

            ❤️ ❤️ ❤️ ❤️ ❤️

        </div>

        <div class="dialog-card">

            <p id="wishText">

                Wishing you the best year, dear.

                <br><br>

                May your days be filled with happiness,
                success, beautiful memories,
                and countless reasons to smile.

            </p>

        </div>

        <button
        class="continue-button"
        onclick="goToFinalPage()">

            Continue ❤️

        </button>

    </div>

</div>

<script>

function goToFinalPage(){

    document.body.style.opacity="0";

    setTimeout(()=>{

        window.location.href="farewell.html";

    },700);

}

</script>

</body>
</html>
